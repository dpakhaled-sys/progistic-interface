<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acrom · Références &amp; Disponibilité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⚙</span>
      <div>
        <h1>ACROM <span>· Web Service</span></h1>
        <p class="brand-sub">Références &amp; disponibilité pièces auto</p>
      </div>
    </div>
    <div id="status" class="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Connexion…</span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="dispo">Disponibilité</button>
    <button class="tab" data-tab="catalogue">Catalogue</button>
  </nav>

  <main>
    <!-- ============ DISPONIBILITÉ ============ -->
    <section id="tab-dispo" class="panel active">
      <div class="search-card">
        <div class="field">
          <label>Marque</label>
          <input id="d-marque" list="marques-list" placeholder="ex. VALEO" autocomplete="off" />
          <datalist id="marques-list"></datalist>
        </div>
        <div class="field">
          <label>Référence</label>
          <input id="d-reference" placeholder="ex. 598752" autocomplete="off" />
        </div>
        <div class="field qty">
          <label>Qté</label>
          <input id="d-quantite" type="number" min="1" value="1" />
        </div>
        <button id="d-search" class="btn-primary">Vérifier</button>
      </div>

      <div id="dispo-results" class="results"></div>
    </section>

    <!-- ============ CATALOGUE ============ -->
    <section id="tab-catalogue" class="panel">
      <div class="catalogue-layout">
        <aside class="brands">
          <div class="brands-head">
            <h2>Marques</h2>
            <label class="filtre">
              <input type="checkbox" id="filtre-mcode" /> avec MCODE
            </label>
          </div>
          <ul id="brands-list" class="brands-list"></ul>
        </aside>
        <div class="refs">
          <div class="refs-head">
            <h2 id="refs-title">Sélectionne une marque</h2>
            <span id="refs-count" class="badge"></span>
          </div>
          <div id="refs-table" class="refs-table"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span id="foot-mode"></span>
    <span class="foot-sep">·</span>
    <span>Données fournies par le Web Service Acrom / System Wone</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
