<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progistique · Références &amp; Disponibilité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="logo.png" alt="Progistique" />
    </div>
    <div class="topbar-right">
      <div id="status" class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connexion…</span>
      </div>
      <button id="logout" class="btn-logout" title="Se déconnecter">Déconnexion</button>
    </div>
  </header>

  <main>
    <!-- ============ DISPONIBILITÉ ============ -->
    <section id="tab-dispo" class="panel active">
      <div class="search-card">
        <div class="field">
          <label>Référence</label>
          <input id="d-reference" placeholder="ex. OC978" autocomplete="off" />
        </div>
        <div class="field qty">
          <label>Qté</label>
          <input id="d-quantite" type="number" min="1" value="1" />
        </div>
        <button id="d-search" class="btn-primary">Vérifier</button>
      </div>

      <div id="dispo-results" class="results"></div>
    </section>
  </main>

  <footer class="foot">
    <span id="foot-mode"></span>
    <span class="foot-sep">·</span>
    <span>Données fournies par le Web Service Acrom / System Wone</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
